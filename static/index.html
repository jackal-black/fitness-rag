<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitness RAG — 健身问答</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0d1117; color: #c9d1d9; min-height: 100vh;
    display: flex; flex-direction: column;
  }
  header {
    background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px;
    display: flex; align-items: center; gap: 12px;
  }
  header h1 { font-size: 18px; color: #58a6ff; }
  header span { color: #8b949e; font-size: 13px; }
  .badge { background: #1f6feb; color: #fff; padding: 2px 8px; border-radius: 12px; font-size: 11px; }

  .container { max-width: 800px; margin: 0 auto; padding: 24px; width: 100%; flex: 1; display: flex; flex-direction: column; }

  .chat-box { flex: 1; overflow-y: auto; padding: 16px 0; display: flex; flex-direction: column; gap: 16px; min-height: 400px; }
  .msg { padding: 12px 16px; border-radius: 8px; max-width: 85%; line-height: 1.6; font-size: 14px; }
  .msg.user { background: #1f6feb; color: #fff; align-self: flex-end; }
  .msg.assistant { background: #21262d; color: #c9d1d9; align-self: flex-start; border: 1px solid #30363d; }
  .msg.assistant .sources { margin-top: 12px; padding-top: 12px; border-top: 1px solid #30363d; font-size: 12px; color: #8b949e; }
  .msg.assistant .sources a { color: #58a6ff; text-decoration: none; }
  .msg.assistant .sources a:hover { text-decoration: underline; }
  .msg.loading { color: #8b949e; font-style: italic; align-self: flex-start; }

  .input-area { border-top: 1px solid #30363d; padding: 16px 0; display: flex; gap: 8px; }
  .input-area input {
    flex: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid #30363d;
    background: #0d1117; color: #c9d1d9; font-size: 14px; outline: none;
  }
  .input-area input:focus { border-color: #58a6ff; }
  .input-area button {
    padding: 12px 24px; border-radius: 8px; border: none;
    background: #238636; color: #fff; font-size: 14px; cursor: pointer; font-weight: 600;
  }
  .input-area button:hover { background: #2ea043; }
  .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
  .input-area select {
    padding: 12px; border-radius: 8px; border: 1px solid #30363d;
    background: #0d1117; color: #c9d1d9; font-size: 14px; outline: none;
  }

  .welcome { text-align: center; padding: 48px 24px; color: #8b949e; }
  .welcome h2 { color: #58a6ff; margin-bottom: 8px; }
  .welcome p { font-size: 14px; line-height: 1.8; }
</style>
</head>
<body>

<header>
  <h1>🏋️ Fitness RAG</h1>
  <span>健身知识问答</span>
  <span class="badge">Hybrid Search</span>
</header>

<div class="container">
  <div class="chat-box" id="chatBox">
    <div class="welcome">
      <h2>💪 问任何健身问题</h2>
      <p>例如：深蹲标准动作是什么<br>减脂期每天吃多少蛋白质<br>什么是渐进超负荷</p>
    </div>
  </div>

  <div class="input-area">
    <select id="retriever">
      <option value="hybrid">Hybrid</option>
      <option value="bm25">BM25</option>
      <option value="tfidf">TF-IDF</option>
    </select>
    <input type="text" id="questionInput" placeholder="输入你的健身问题…" autofocus>
    <button id="sendBtn">发送</button>
  </div>
</div>

<script>
  const chatBox = document.getElementById('chatBox');
  const input = document.getElementById('questionInput');
  const sendBtn = document.getElementById('sendBtn');
  const retriever = document.getElementById('retriever');
  let sessionId = null;

  function scrollBottom() { chatBox.scrollTop = chatBox.scrollHeight; }

  function addMessage(role, content, sources) {
    // 移除欢迎语
    const welcome = chatBox.querySelector('.welcome');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.className = `msg ${role}`;

    if (role === 'assistant' && sources) {
      div.innerHTML = marked(content);
      const srcDiv = document.createElement('div');
      srcDiv.className = 'sources';
      srcDiv.innerHTML = '<strong>来源：</strong>' + sources.map(s =>
        `<a href="#" onclick="return false">${s.source}</a>`
      ).join(' ');
      div.appendChild(srcDiv);
    } else {
      div.textContent = content;
    }

    chatBox.appendChild(div);
    scrollBottom();
    return div;
  }

  function addLoading() {
    const div = document.createElement('div');
    div.className = 'msg loading';
    div.id = 'loadingMsg';
    div.textContent = '🤔 思考中…';
    chatBox.appendChild(div);
    scrollBottom();
    return div;
  }

  function removeLoading() {
    const el = document.getElementById('loadingMsg');
    if (el) el.remove();
  }

  async function sendQuestion() {
    const question = input.value.trim();
    if (!question) return;

    input.value = '';
    sendBtn.disabled = true;
    addMessage('user', question);

    const loadingEl = addLoading();

    try {
      // 先尝试流式
      const streamResp = await fetch('/ask/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          question,
          top_k: 5,
          retriever: retriever.value,
        }),
      });

      if (!streamResp.ok) throw new Error('Stream failed, trying /chat');

      removeLoading();
      const msgDiv = addMessage('assistant', '');

      const reader = streamResp.body.getReader();
      const decoder = new TextDecoder();
      let answer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const text = decoder.decode(value);
        const lines = text.split('\n');
        for (const line of lines) {
          if (line.startsWith('data: ') && line !== 'data: [DONE]') {
            const token = line.slice(6);
            answer += token;
            msgDiv.firstChild?.remove();
            msgDiv.insertBefore(document.createTextNode(answer), msgDiv.querySelector('.sources'));
          }
        }
      }

      // 获取来源
      const srcResp = await fetch('/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, top_k: 3, retriever: retriever.value }),
      });
      const srcData = await srcResp.json();
      if (srcData.sources?.length) {
        const srcDiv = document.createElement('div');
        srcDiv.className = 'sources';
        srcDiv.innerHTML = '<strong>来源：</strong>' + srcData.sources.map(s =>
          `<span style="color:#58a6ff;margin-right:8px">${s.source} (${s.similarity})</span>`
        ).join('');
        msgDiv.appendChild(srcDiv);
      }

    } catch {
      // 降级到 /chat
      removeLoading();
      try {
        const resp = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            question,
            session_id: sessionId,
            top_k: 5,
            retriever: retriever.value,
          }),
        });
        const data = await resp.json();
        sessionId = data.session_id;
        addMessage('assistant', data.answer, data.sources);
      } catch (e) {
        addMessage('assistant', '❌ 连接失败，请确认服务已启动');
      }
    }

    sendBtn.disabled = false;
    input.focus();
  }

  sendBtn.addEventListener('click', sendQuestion);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') sendQuestion(); });
</script>
</body>
</html>
